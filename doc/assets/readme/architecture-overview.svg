<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f8ff"/>
      <stop offset="100%" stop-color="#eef6f1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#9db2c7" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 42px 'Helvetica Neue', Arial, sans-serif; fill: #12314d; }
      .subtitle { font: 500 18px 'Helvetica Neue', Arial, sans-serif; fill: #31506b; }
      .boxTitle { font: 700 24px 'Helvetica Neue', Arial, sans-serif; fill: #0f2a43; }
      .boxText { font: 500 15px 'Helvetica Neue', Arial, sans-serif; fill: #254a6a; }
      .cap { font: 700 16px 'Helvetica Neue', Arial, sans-serif; fill: #0f2a43; }
      .link { stroke: #4d83b6; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#4d83b6"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="80" y="84" class="title">InDepth Runtime Architecture</text>
  <text x="80" y="118" class="subtitle">Executable · Observable · Verifiable · Memory-Driven</text>

  <rect x="80" y="180" rx="20" ry="20" width="260" height="120" fill="#ffffff" filter="url(#shadow)"/>
  <text x="110" y="230" class="boxTitle">User / CLI</text>
  <text x="110" y="262" class="boxText">Task input &amp; session loop</text>

  <rect x="420" y="150" rx="22" ry="22" width="420" height="180" fill="#ffffff" filter="url(#shadow)"/>
  <text x="450" y="205" class="boxTitle">Agent Runtime</text>
  <text x="450" y="238" class="boxText">message assembly · model call · tool loop · stop reason</text>
  <text x="450" y="264" class="boxText">mid-run compaction · eval trigger · memory finalize</text>

  <rect x="920" y="120" rx="20" ry="20" width="280" height="120" fill="#ffffff" filter="url(#shadow)"/>
  <text x="950" y="172" class="boxTitle">Model Provider</text>
  <text x="950" y="203" class="boxText">OpenAI-compatible chat</text>

  <rect x="920" y="280" rx="20" ry="20" width="280" height="150" fill="#ffffff" filter="url(#shadow)"/>
  <text x="950" y="332" class="boxTitle">Tool Registry</text>
  <text x="950" y="363" class="boxText">bash · file · time · search guard</text>
  <text x="950" y="389" class="boxText">todo · subagent · memory harvest</text>

  <rect x="1260" y="120" rx="20" ry="20" width="260" height="120" fill="#ffffff" filter="url(#shadow)"/>
  <text x="1290" y="172" class="boxTitle">Eval</text>
  <text x="1290" y="203" class="boxText">deterministic + LLM judge</text>

  <rect x="1260" y="280" rx="20" ry="20" width="260" height="150" fill="#ffffff" filter="url(#shadow)"/>
  <text x="1290" y="332" class="boxTitle">Observability</text>
  <text x="1290" y="363" class="boxText">events.jsonl</text>
  <text x="1290" y="389" class="boxText">postmortem.md + metrics</text>

  <rect x="420" y="430" rx="22" ry="22" width="780" height="180" fill="#ffffff" filter="url(#shadow)"/>
  <text x="450" y="485" class="boxTitle">Memory Layer</text>
  <text x="450" y="518" class="boxText">runtime memory (messages + summary_json) · context compressor (v1)</text>
  <text x="450" y="544" class="boxText">system memory cards (db/system_memory.db) · memory trigger/retrieval/decision events</text>

  <rect x="420" y="660" rx="22" ry="22" width="780" height="150" fill="#ffffff" filter="url(#shadow)"/>
  <text x="450" y="714" class="boxTitle">SubAgent Collaboration</text>
  <text x="450" y="746" class="boxText">roles: researcher · builder · reviewer · verifier · general</text>
  <text x="450" y="772" class="boxText">parallel execution + role-specific tool isolation</text>

  <path class="link" d="M340 240 L420 240"/>
  <path class="link" d="M840 205 L920 180"/>
  <path class="link" d="M840 285 L920 340"/>
  <path class="link" d="M1200 180 L1260 180"/>
  <path class="link" d="M1200 340 L1260 340"/>
  <path class="link" d="M810 330 L810 430"/>
  <path class="link" d="M810 610 L810 660"/>

  <text x="80" y="860" class="subtitle">Generated for README visual explanation · editable SVG source</text>
</svg>
