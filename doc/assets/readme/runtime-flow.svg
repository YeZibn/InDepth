<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#f2fff8"/>
    </linearGradient>
    <style>
      .t { font: 700 40px 'Helvetica Neue', Arial, sans-serif; fill: #0f2a43; }
      .s { font: 500 18px 'Helvetica Neue', Arial, sans-serif; fill: #2d4b66; }
      .n { font: 700 19px 'Helvetica Neue', Arial, sans-serif; fill: #12314d; }
      .d { font: 500 15px 'Helvetica Neue', Arial, sans-serif; fill: #31506b; }
      .step { fill: #fff; stroke: #a7c0d8; stroke-width: 2; }
      .arrow { stroke: #4f81b2; stroke-width: 3; fill: none; marker-end: url(#arr); }
      .alt { fill: #eef7ff; stroke: #9cb9d5; stroke-width: 2; }
    </style>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#4f81b2"/>
    </marker>
  </defs>

  <rect width="1600" height="960" fill="url(#bg2)"/>
  <text x="80" y="82" class="t">Runtime Execution Flow</text>
  <text x="80" y="116" class="s">from input to judgement, memory finalize and postmortem</text>

  <rect x="80" y="170" width="250" height="92" rx="16" class="step"/>
  <text x="108" y="212" class="n">1) task_started</text>
  <text x="108" y="237" class="d">build system/history/user</text>

  <rect x="390" y="170" width="300" height="92" rx="16" class="step"/>
  <text x="420" y="212" class="n">2) model generate</text>
  <text x="420" y="237" class="d">with tool schemas</text>

  <rect x="750" y="170" width="320" height="92" rx="16" class="step"/>
  <text x="778" y="212" class="n">3) parse finish_reason</text>
  <text x="778" y="237" class="d">tool_calls / stop / length ...</text>

  <rect x="1130" y="170" width="390" height="92" rx="16" class="step"/>
  <text x="1160" y="212" class="n">4) branch handling</text>
  <text x="1160" y="237" class="d">tool invoke, append tool message, collect failures</text>

  <rect x="260" y="350" width="420" height="100" rx="16" class="alt"/>
  <text x="290" y="392" class="n">tool_calls branch</text>
  <text x="290" y="418" class="d">emit tool_called/tool_succeeded|failed and continue loop</text>

  <rect x="760" y="350" width="420" height="100" rx="16" class="alt"/>
  <text x="790" y="392" class="n">stop/fallback branch</text>
  <text x="790" y="418" class="d">final_answer + stop_reason resolved</text>

  <rect x="80" y="540" width="420" height="110" rx="16" class="step"/>
  <text x="112" y="584" class="n">5) task_finished event</text>
  <text x="112" y="610" class="d">generate initial postmortem for same run evidence</text>

  <rect x="560" y="540" width="420" height="110" rx="16" class="step"/>
  <text x="592" y="584" class="n">6) evaluate judgement</text>
  <text x="592" y="610" class="d">verification_started -> pass/fail -> task_judged</text>

  <rect x="1040" y="540" width="480" height="110" rx="16" class="step"/>
  <text x="1072" y="584" class="n">7) finalize memory</text>
  <text x="1072" y="610" class="d">upsert postmortem card + memory trigger/retrieval/decision</text>

  <rect x="300" y="740" width="1000" height="120" rx="18" class="step"/>
  <text x="336" y="788" class="n">8) final compact + return</text>
  <text x="336" y="814" class="d">append final assistant if needed -> compact_final() -> return final_answer</text>

  <path class="arrow" d="M330 216 L390 216"/>
  <path class="arrow" d="M690 216 L750 216"/>
  <path class="arrow" d="M1070 216 L1130 216"/>

  <path class="arrow" d="M1240 262 L1240 320 L970 320 L970 350"/>
  <path class="arrow" d="M1240 262 L1240 320 L470 320 L470 350"/>

  <path class="arrow" d="M470 450 L470 510 L290 510 L290 540"/>
  <path class="arrow" d="M970 450 L970 510 L770 510 L770 540"/>

  <path class="arrow" d="M500 595 L560 595"/>
  <path class="arrow" d="M980 595 L1040 595"/>
  <path class="arrow" d="M1280 650 L1280 700 L800 700 L800 740"/>

  <text x="80" y="916" class="s">Key note: task_finished is emitted before task_judged; final judgement relies on task_judged payload.</text>
</svg>
